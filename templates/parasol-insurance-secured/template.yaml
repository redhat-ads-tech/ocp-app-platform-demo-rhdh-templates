apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: parasol-insurance-secured-dev
  title: Parasol Insurance Secured Development
  description: Create a secured development sandbox for the Parasol Insurance app
  tags:
    - parasol
    - secured
    - development
spec:
  owner: rhdh
  type: service

  parameters:
    - title: Development Branch
      required:
        - branch
      properties:
        branch:
          title: Branch Name
          type: string
          description: Branch name in the parasol-insurance source repo
    - title: Infrastructure Settings
      required:
        - gitlab_host
        - registry_host
        - cluster_subdomain
        - gitops_namespace
      properties:
        gitlab_host:
          title: GitLab Host
          type: string
          description: GitLab hostname (e.g. gitlab-gitlab.apps.cluster.example.com)
        registry_host:
          title: Registry Host
          type: string
          description: Container registry hostname (e.g. quay-quay.apps.cluster.example.com)
        cluster_subdomain:
          title: Cluster Subdomain
          type: string
          description: OpenShift apps subdomain (e.g. apps.cluster.example.com)
        gitops_namespace:
          title: GitOps Namespace
          type: string
          description: ArgoCD namespace
          default: rhdh-gitops

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./manifests/
        values:
          namespace: parasol-insurance-secured-${{ user.entity.metadata.name }}
          branch: ${{ parameters.branch }}
          source_repo: https://${{ parameters.gitlab_host }}/parasol/parasol-insurance.git
          owner: ${{ user.entity.metadata.name }}
          image_host: ${{ parameters.registry_host }}
          image_organization: parasol
          image_name: parasol-insurance-secured
          image_tag: latest
          gitlab_host: ${{ parameters.gitlab_host }}
          cluster_subdomain: ${{ parameters.cluster_subdomain }}
          gitops_namespace: ${{ parameters.gitops_namespace }}
          source_gitops_repo_url: ${{ steps.publish.output.remoteUrl }}

    - id: publish
      name: Publish to GitLab
      action: publish:gitlab
      input:
        repoUrl: ${{ parameters.gitlab_host }}?owner=${{ user.entity.metadata.name }}&repo=parasol-insurance-secured-${{ parameters.branch }}-gitops
        defaultBranch: main
        repoVisibility: public

    - id: create-argocd-resources
      name: Create ArgoCD Resources
      action: argocd:create-resources
      input:
        appName: parasol-insurance-secured-${{ user.entity.metadata.name }}-${{ parameters.branch }}
        argoInstance: main
        namespace: ${{ parameters.gitops_namespace }}
        repoUrl: ${{ steps.publish.output.remoteUrl }}
        path: argocd

    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitOps Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
