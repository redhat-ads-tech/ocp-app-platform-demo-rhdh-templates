apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parasol-insurance-secured-${{ values.owner }}-${{ values.branch }}
  namespace: ${{ values.gitops_namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ${{ values.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: helm
    repoURL: ${{ values.source_gitops_repo_url }}
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
